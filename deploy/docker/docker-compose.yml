version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       locigram
      POSTGRES_USER:     locigram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locigram"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  locigram:
    image: ghcr.io/locigram/locigram:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://locigram:${POSTGRES_PASSWORD}@postgres:5432/locigram
      QDRANT_URL:   http://qdrant:6333
      PALACE_ID:    ${PALACE_ID}
      API_TOKEN:    ${API_TOKEN}

      # ── LLM — point at any OpenAI-compatible endpoint ──────────────────────
      # Ollama (local, free): https://ollama.com
      #   ollama pull nomic-embed-text && ollama pull qwen2.5:7b
      LOCIGRAM_EMBED_URL:     ${LOCIGRAM_EMBED_URL:-http://host.docker.internal:11434/v1}
      LOCIGRAM_EMBED_MODEL:   ${LOCIGRAM_EMBED_MODEL:-nomic-embed-text}
      LOCIGRAM_EMBED_KEY:     ${LOCIGRAM_EMBED_KEY:-}

      # OpenAI / Together / Groq / any OpenAI-compatible API
      LOCIGRAM_EXTRACT_URL:   ${LOCIGRAM_EXTRACT_URL:-http://host.docker.internal:11434/v1}
      LOCIGRAM_EXTRACT_MODEL: ${LOCIGRAM_EXTRACT_MODEL:-qwen2.5:7b}
      LOCIGRAM_EXTRACT_KEY:   ${LOCIGRAM_EXTRACT_KEY:-}

      # Optional: separate model for truth/summarization (falls back to extract)
      LOCIGRAM_SUMMARY_URL:   ${LOCIGRAM_SUMMARY_URL:-}
      LOCIGRAM_SUMMARY_MODEL: ${LOCIGRAM_SUMMARY_MODEL:-}
      LOCIGRAM_SUMMARY_KEY:   ${LOCIGRAM_SUMMARY_KEY:-}

      # ── Connectors — add whichever you have ────────────────────────────────
      # Microsoft 365 (email + Teams)
      LOCIGRAM_M365_TENANT_ID:        ${LOCIGRAM_M365_TENANT_ID:-}
      LOCIGRAM_M365_CLIENT_ID:        ${LOCIGRAM_M365_CLIENT_ID:-}
      LOCIGRAM_M365_CLIENT_SECRET:    ${LOCIGRAM_M365_CLIENT_SECRET:-}
      LOCIGRAM_M365_MAILBOXES:        ${LOCIGRAM_M365_MAILBOXES:-}

      # HaloPSA (support tickets)
      LOCIGRAM_HALOPSA_URL:           ${LOCIGRAM_HALOPSA_URL:-}
      LOCIGRAM_HALOPSA_CLIENT_ID:     ${LOCIGRAM_HALOPSA_CLIENT_ID:-}
      LOCIGRAM_HALOPSA_CLIENT_SECRET: ${LOCIGRAM_HALOPSA_CLIENT_SECRET:-}

      # NinjaOne (devices + alerts)
      LOCIGRAM_NINJA_CLIENT_ID:       ${LOCIGRAM_NINJA_CLIENT_ID:-}
      LOCIGRAM_NINJA_CLIENT_SECRET:   ${LOCIGRAM_NINJA_CLIENT_SECRET:-}

      # Gmail
      LOCIGRAM_GMAIL_CLIENT_ID:       ${LOCIGRAM_GMAIL_CLIENT_ID:-}
      LOCIGRAM_GMAIL_CLIENT_SECRET:   ${LOCIGRAM_GMAIL_CLIENT_SECRET:-}
      LOCIGRAM_GMAIL_REFRESH_TOKEN:   ${LOCIGRAM_GMAIL_REFRESH_TOKEN:-}

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
