---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gliner-server
  namespace: ai-gateway
  labels:
    app: gliner-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gliner-server
  template:
    metadata:
      labels:
        app: gliner-server
    spec:
      containers:
        - name: gliner-server
          image: ghcr.io/locigram/gliner-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: GLINER_MODEL
              value: "knowledgator/gliner-multitask-large-v0.5"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: v1
kind: Service
metadata:
  name: gliner-server
  namespace: ai-gateway
spec:
  type: NodePort
  selector:
    app: gliner-server
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30901
