apiVersion: batch/v1
kind: CronJob
metadata:
  name: secondbrain-sync
  namespace: surullc
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: secondbrain-sync
              image: ghcr.io/locigram/secondbrain-sync:latest
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "300m"
              envFrom:
                - secretRef:
                    name: secondbrain-sync-secrets
